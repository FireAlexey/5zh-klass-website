<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Чат класса</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<style>

body{
margin:0;
font-family:Roboto,sans-serif;
background:#e5ddd5;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#0088cc;
color:white;
padding:12px;
font-size:18px;
display:flex;
justify-content:space-between;
}

header a{
color:white;
text-decoration:none;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.message{
max-width:70%;
padding:10px;
border-radius:12px;
position:relative;
word-wrap:break-word;
font-size:15px;
}

.mine{
background:#dcf8c6;
margin-left:auto;
}

.other{
background:white;
margin-right:auto;
}

.time{
font-size:11px;
opacity:0.6;
margin-left:6px;
}

.actions{
display:none;
margin-top:5px;
}

.actions button{
font-size:12px;
margin-right:4px;
}

.message.active .actions{
display:block;
}

.input-area{
display:flex;
padding:10px;
background:white;
gap:6px;
}

#messageInput{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
font-size:16px;
}

#sendBtn{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:#0088cc;
color:white;
font-size:18px;
}

#auth{
padding:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px;
border:none;
background:#0088cc;
color:white;
border-radius:6px;
}

</style>
</head>

<body>

<header>
<span>Чат класса</span>
<a href="index.html">Главная</a>
</header>

<div id="auth">

<input id="nickname" placeholder="Ник">
<input id="password" type="password" placeholder="Пароль">

<button onclick="register()">Регистрация</button>
<button onclick="login()">Вход</button>

</div>

<div id="messages" style="display:none"></div>

<div class="input-area" id="chatControls" style="display:none">

<input id="messageInput" placeholder="Сообщение...">

<button id="sendBtn">➤</button>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyDlRb8b_XOOOiEtU_M1YhrA9R3Wl8iF5xs",
authDomain:"klass-fda45.firebaseapp.com",
databaseURL:"https://klass-fda45-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"klass-fda45"
}

firebase.initializeApp(firebaseConfig)

const auth=firebase.auth()
const db=firebase.database()

let isAdmin=false

const messages=document.getElementById("messages")

async function register(){

const nick=nickname.value
const pass=password.value

const user=await auth.createUserWithEmailAndPassword(nick+"@chat.local",pass)

await db.ref("users/"+user.user.uid).set({
nickname:nick
})

}

async function login(){

const nick=nickname.value
const pass=password.value

await auth.signInWithEmailAndPassword(nick+"@chat.local",pass)

}

document.getElementById("sendBtn").onclick=sendMessage

function sendMessage(){

const text=messageInput.value.trim()

if(!text)return

const user=auth.currentUser

db.ref("users/"+user.uid).once("value").then(s=>{

const nick=s.val()?.nickname||"User"

db.ref("messages").push({
user:nick,
uid:user.uid,
text:text,
timestamp:Date.now()
})

})

messageInput.value=""

}

function createMessage(snapshot){

const msg=snapshot.val()
const key=snapshot.key

const div=document.createElement("div")

div.className="message"

if(msg.uid===auth.currentUser.uid){
div.classList.add("mine")
}else{
div.classList.add("other")
}

div.dataset.key=key

const time=new Date(msg.timestamp).toLocaleTimeString()

div.innerHTML=
"<b>"+msg.user+"</b> "+
"<span class='time'>"+time+"</span>"+
"<div class='msg-text'>"+msg.text+"</div>"

div.onclick=()=>{
div.classList.toggle("active")
}

const user=auth.currentUser

if(user){

const actions=document.createElement("div")
actions.className="actions"

if(user.uid===msg.uid){

const edit=document.createElement("button")
edit.textContent="Редактировать"

edit.onclick=()=>{

const t=prompt("Редактировать",msg.text)

if(t===null)return

db.ref("messages/"+key).update({text:t})

}

actions.appendChild(edit)

}

if(user.uid===msg.uid || isAdmin){

const del=document.createElement("button")
del.textContent="Удалить"

del.onclick=()=>{

db.ref("messages/"+key).remove()

}

actions.appendChild(del)

}

if(actions.children.length>0){
div.appendChild(actions)
}

}

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("auth").style.display="none"
messages.style.display="flex"
document.getElementById("chatControls").style.display="flex"

db.ref("admins/"+user.uid).once("value").then(s=>{
if(s.exists())isAdmin=true
})

messages.innerHTML=""

db.ref("messages").on("child_added",createMessage)

db.ref("messages").on("child_changed",snap=>{

const key=snap.key
const msg=snap.val()

const div=document.querySelector(`[data-key="${key}"]`)

if(div){
div.querySelector(".msg-text").textContent=msg.text
}

})

db.ref("messages").on("child_removed",snap=>{

const key=snap.key
const div=document.querySelector(`[data-key="${key}"]`)

if(div)div.remove()

})

}else{

document.getElementById("auth").style.display="block"
messages.style.display="none"
document.getElementById("chatControls").style.display="none"

}

})

</script>

</body>
</html>
