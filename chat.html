<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Чат 5 "Ж"</title>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<style>

:root{
--bg:#f0f0f0;
--text:#000;
--card:#ffffff;
--button:#3498db;
}

body.dark{
--bg:#1e1e1e;
--text:#eee;
--card:#2c2c2c;
--button:#5555ff;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:12px;
background:var(--card);
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.message{
background:var(--card);
padding:8px 12px;
border-radius:12px;
max-width:80%;
}

.message strong{
font-size:14px;
}

.message img{
max-width:200px;
border-radius:8px;
margin-top:5px;
}

.time{
font-size:11px;
opacity:0.6;
margin-left:5px;
}

.actions{
margin-top:5px;
}

.actions button{
font-size:12px;
margin-right:5px;
}

.input-area{
display:flex;
padding:10px;
background:var(--card);
gap:5px;
}

#messageInput{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

#sendBtn{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:var(--button);
color:white;
font-size:18px;
cursor:pointer;
}

#imageInput{
display:none;
}

#authSection{
padding:20px;
}

input{
padding:10px;
margin-bottom:10px;
width:100%;
box-sizing:border-box;
}

button{
padding:10px;
border:none;
background:var(--button);
color:white;
cursor:pointer;
border-radius:6px;
}

#themeToggle{
font-size:20px;
background:none;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<span>Чат 5 "Ж"</span>
<div>
<button id="themeToggle">☀️</button>
<a href="index.html">🏠</a>
</div>
</header>

<div id="authSection">

<input id="nickname" placeholder="Никнейм">
<input id="password" type="password" placeholder="Пароль">

<button id="registerBtn">Регистрация</button>
<button id="loginBtn">Вход</button>

</div>

<div id="messages" style="display:none"></div>

<div class="input-area" id="chatControls" style="display:none">

<input id="messageInput" placeholder="Сообщение...">
<input id="imageInput" placeholder="Ссылка на GIF или фото">

<button id="sendBtn">➤</button>

</div>

<script>

let isAdmin=false

const firebaseConfig={
apiKey:"AIzaSyDlRb8b_XOOOiEtU_M1YhrA9R3Wl8iF5xs",
authDomain:"klass-fda45.firebaseapp.com",
databaseURL:"https://klass-fda45-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"klass-fda45",
storageBucket:"klass-fda45.appspot.com",
messagingSenderId:"1063291699872",
appId:"1:1063291699872:web:e01c9c9a984b3d63733fc5"
}

firebase.initializeApp(firebaseConfig)

const auth=firebase.auth()
const db=firebase.database()

const authSection=document.getElementById("authSection")
const messages=document.getElementById("messages")
const messageInput=document.getElementById("messageInput")

document.getElementById("registerBtn").onclick=register
document.getElementById("loginBtn").onclick=login
document.getElementById("sendBtn").onclick=sendMessage

const themeToggle=document.getElementById("themeToggle")

function setTheme(dark){
if(dark){
document.body.classList.add("dark")
themeToggle.textContent="🌙"
}else{
document.body.classList.remove("dark")
themeToggle.textContent="☀️"
}
}

themeToggle.onclick=()=>{
const dark=!document.body.classList.contains("dark")
setTheme(dark)
localStorage.setItem("darkMode",dark)
}

window.onload=()=>{
setTheme(localStorage.getItem("darkMode")==="true")
}

async function register(){

const nick=nickname.value.trim()
const pass=password.value.trim()

if(!nick||!pass)return alert("Введите данные")

const user=await auth.createUserWithEmailAndPassword(nick+"@chat.local",pass)

await db.ref("users/"+user.user.uid).set({
nickname:nick
})

alert("Регистрация успешна")

}

async function login(){

const nick=nickname.value.trim()
const pass=password.value.trim()

await auth.signInWithEmailAndPassword(nick+"@chat.local",pass)

}

function sendMessage(){

const text=messageInput.value.trim()

if(!text)return

const user=auth.currentUser

db.ref("users/"+user.uid).once("value").then(s=>{

const nick=s.val()?.nickname||"Аноним"

db.ref("messages").push({
user:nick,
uid:user.uid,
text:text,
timestamp:Date.now()
})

})

messageInput.value=""

}

function addMessage(snapshot){

const msg=snapshot.val()
const key=snapshot.key

const div=document.createElement("div")
div.className="message"
div.dataset.key=key

const time=new Date(msg.timestamp).toLocaleTimeString()

div.innerHTML="<strong>"+msg.user+"</strong><span class='time'>"+time+"</span><br>"+(msg.text||"")

if(msg.image){

const img=document.createElement("img")
img.src=msg.image
div.appendChild(img)

}

const user=auth.currentUser

if(user && user.uid === msg.uid){

const actions=document.createElement("div")
actions.className="actions"

const del=document.createElement("button")
del.textContent="🗑"

del.onclick=()=>{
db.ref("messages/"+key).remove()
}

const edit=document.createElement("button")
edit.textContent="✏️"

edit.onclick=()=>{

const t=prompt("Редактировать сообщение",msg.text)

if(t===null)return

db.ref("messages/"+key).update({
text:t
})

}

actions.appendChild(edit)
actions.appendChild(del)

div.appendChild(actions)

}

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

auth.onAuthStateChanged(user=>{

if(user){

authSection.style.display="none"
messages.style.display="flex"
document.getElementById("chatControls").style.display="flex"

db.ref("admins/"+user.uid).once("value").then(s=>{
if(s.exists())isAdmin=true
})

db.ref("messages").on("child_added",addMessage)

}else{

authSection.style.display="block"
messages.style.display="none"
document.getElementById("chatControls").style.display="none"

}

})

</script>

</body>
</html>
