<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>5 "Ж" класс — Главная</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #f0f4f8;
      --text: #000;
      --card: #fff;
      --button: #3498db;
      --button-hover: #2980b9;
    }

    body.dark {
      --bg: #121212;
      --text: #eee;
      --card: #1e1e1e;
      --button: #5555ff;
      --button-hover: #4444dd;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      max-width: 800px;
      margin: 60px auto;
      background-color: var(--card);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      color: var(--text);
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 24px;
      font-size: 16px;
      color: #fff;
      background-color: var(--button);
      border: none;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: var(--button-hover);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      background: var(--button);
      color: white;
      border: 2px solid var(--button-hover);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 16px;
      cursor: pointer;
      z-index: 100;
    }

    .theme-toggle:hover {
      background-color: var(--button-hover);
    }

    #authSection {
      margin-top: 20px;
    }

    #welcome {
      text-align: center;
      margin-top: 20px;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .container {
        margin: 20px 10px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</button>

  <div class="container">
    <h1>Сайт 5 "Ж" класса</h1>

    <div id="authSection">
      <input type="text" id="nickname" placeholder="Никнейм">
      <input type="password" id="password" placeholder="Пароль">
      <button class="btn" id="registerBtn">Регистрация</button>
      <button class="btn" id="loginBtn">Вход</button>
    </div>

    <div id="welcome" style="display:none;">
      Добро пожаловать, <span id="userNick"></span>!
      <br>
      <a href="chat.html" class="btn">Перейти в чат</a>
      <a href="news.html" class="btn">Новости класса</a>
      <br>
      <button class="btn" id="logoutBtn" style="margin-top:10px;">Выйти</button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDlRb8b_XOOOiEtU_M1YhrA9R3Wl8iF5xs",
      authDomain: "klass-fda45.firebaseapp.com",
      databaseURL: "https://klass-fda45-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "klass-fda45",
      storageBucket: "klass-fda45.appspot.com",
      messagingSenderId: "1063291699872",
      appId: "1:1063291699872:web:e01c9c9a984b3d63733fc5"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const registerBtn = document.getElementById("registerBtn");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    registerBtn.onclick = register;
    loginBtn.onclick = login;
    logoutBtn.onclick = logout;

    async function register() {
      const nickname = document.getElementById("nickname").value;
      const password = document.getElementById("password").value;
      if (!nickname || !password) return alert("Введите ник и пароль");
      try {
        const user = await auth.createUserWithEmailAndPassword(nickname + "@chat.local", password);
        await db.ref("users/" + user.user.uid).set({ nickname });
        alert("Регистрация прошла успешно!");
      } catch (error) {
        alert("Ошибка регистрации: " + error.message);
      }
    }

    async function login() {
      const nickname = document.getElementById("nickname").value;
      const password = document.getElementById("password").value;
      if (!nickname || !password) return alert("Введите ник и пароль");
      try {
        await auth.signInWithEmailAndPassword(nickname + "@chat.local", password);
      } catch (error) {
        alert("Ошибка входа: " + error.message);
      }
    }

    function logout() {
      auth.signOut();
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const snap = await db.ref("users/" + user.uid).once("value");
        const nickname = snap.val()?.nickname || "Аноним";
        document.getElementById("userNick").textContent = nickname;
        document.getElementById("authSection").style.display = "none";
        document.getElementById("welcome").style.display = "block";
      } else {
        document.getElementById("authSection").style.display = "block";
        document.getElementById("welcome").style.display = "none";
      }
    });

    const toggleButton = document.getElementById("themeToggle");
    function toggleTheme() {
      document.body.classList.toggle("dark");
      const isDark = document.body.classList.contains("dark");
      localStorage.setItem("darkMode", isDark);
      toggleButton.textContent = isDark ? "☀️" : "🌙";
    }

    window.onload = () => {
      const isDark = localStorage.getItem("darkMode") === "true";
      if (isDark) document.body.classList.add("dark");
      toggleButton.textContent = isDark ? "☀️" : "🌙";
    };
  </script>
</body>
</html>
